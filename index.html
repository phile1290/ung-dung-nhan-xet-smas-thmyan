<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Lê Văn Phi">
    <title>Hệ Thống Đánh Giá Năng Lực Tại Nhà</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/docx@7.3.0/build/index.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; padding: 20px; background: linear-gradient(180deg, #e6deff 0%, #c4d7ff 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header-title { color: #0066cc; text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .sub-title { color: #7f8c8d; text-align: center; font-size: 16px; margin-bottom: 25px; }
        .card { background-color: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; width: 100%; max-width: 550px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; font-size: 14px; }
        .helper-text { font-size: 12px; color: #888; font-style: italic; margin-bottom: 5px; display: block; }
        input[type="text"], input[type="password"], select, input[type="file"] { width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #0066cc; }
        .btn-primary { background-color: #0066cc; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; padding: 15px; border-radius: 10px; margin-top: 10px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,102,204,0.3); }
        .btn-primary:hover { background-color: #0052a3; }
        .btn-success { background-color: #28a745; margin-top: 20px; box-shadow: 0 4px 15px rgba(40,167,69,0.3); }
        .btn-success:hover { background-color: #218838; }
        #status { text-align: center; font-weight: bold; margin-top: 15px; color: #0066cc; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
        th { background-color: #f8f9fa; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-title">Hệ Thống Đánh Giá<br>Năng Lực Tại Nhà</div>
    <div class="sub-title">ứng dụng được phát triển bởi thầy giáo<br>Lê Văn Phi</div>

    <div class="card">
        <div class="form-group">
            <label>Khối lớp đang đánh giá:</label>
            <select id="khoiLop">
                <option value="1">Khối 1</option><option value="2">Khối 2</option>
                <option value="3">Khối 3</option><option value="4">Khối 4</option><option value="5">Khối 5</option>
            </select>
        </div>
        <div class="form-group">
            <label>Loại bảng điểm:</label>
            <select id="loaiBangDiem">
                <option value="monHoc">Đánh giá môn học và hoạt động giáo dục</option>
                <option value="nangLuc">Đánh giá năng lực và phẩm chất</option>
            </select>
        </div>
        <div class="form-group">
            <label>API Key (Google AI Studio):</label>
            <input type="password" id="apiKey" placeholder="Nhập Gemini API Key...">
        </div>
        <div class="form-group">
            <label>Link Web App (Google Apps Script):</label>
            <input type="text" id="gasUrl" placeholder="Dán Web App URL...">
        </div>
        <div class="form-group">
            <label>Tải bảng điểm lên (.xlsx, .xls):</label>
            <span class="helper-text">Anh có thể quét chọn tải nhiều file Excel lên cùng lúc.</span>
            <input type="file" id="fileUpload" accept=".xlsx, .xls" multiple>
        </div>

        <button class="btn-primary" onclick="batDauXuLy()">Xác Nhận Xử Lý Dữ Liệu</button>
        <div id="status"></div>
    </div>

    <div class="card" id="previewArea" style="display: none; margin-top: 20px; max-width: 900px; width: 100%;">
        <h3 style="text-align: center; color: #333;">Tệp sẽ tải về: <span id="tenTepHienThi" style="color: #0066cc;"></span></h3>
        <div id="tableContainer" style="overflow-x: auto;"></div>
        <button class="btn-primary btn-success" onclick="xuatFileWord()">Tải Về File Word</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
